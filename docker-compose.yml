services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: signportal
      POSTGRES_USER: signportal
      POSTGRES_PASSWORD: signportal_pass
    volumes: [pgdata:/var/lib/postgresql/data]
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./data/uploads:/app/storage/uploads
      - ./data/signed:/app/storage/signed
    depends_on: [db]
    # ports:
    #   - "8000:8000"
  frontend:
    build: ./frontend
  nginx:
    image: nginx:1.27-alpine
    ports: ["8081:80"]
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, backend]
volumes:
  pgdata:
